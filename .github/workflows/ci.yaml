name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${ secrets.DOCKERHUB_REPOSITORY }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Extract tag from commit or generate build number
        id: get_tag
        run: |
          echo "BUILD_TAG=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV
          echo "tag=build-${{ env.BUILD_TAG }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.get_tag.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
